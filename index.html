<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Tema 2 Específico — Actos Administrativos y Órganos | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #d97706; --naranja-claro: #fef3c7; --naranja-borde: #f59e0b;
    --azul-oscuro: #1e293b; --texto: #374151; --texto-suave: #6b7280;
    --borde: #e5e7eb; --fondo: #fafaf9; --blanco: #ffffff;
    --verde: #166534; --verde-bg: #f0fdf4; --verde-borde: #86efac;
    --rojo: #991b1b; --rojo-bg: #fef2f2; --rojo-borde: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  header { background: var(--blanco); border-bottom: 1px solid var(--borde); }
  .header-top { max-width: 860px; margin: 0 auto; padding: 1.4rem 1.5rem 1rem; display: flex; align-items: flex-start; gap: 1.2rem; }
  .header-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: contain; flex-shrink: 0; }
  .header-textos { flex: 1; }
  .header-site { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--naranja); font-weight: 600; margin-bottom: 3px; }
  .header-titulo { font-family: 'Lora', serif; font-size: clamp(1.2rem, 3.5vw, 1.7rem); font-weight: 700; color: var(--azul-oscuro); line-height: 1.2; }
  .header-sub { font-size: 0.88rem; color: var(--texto-suave); margin-top: 4px; }
  .header-meta { background: var(--naranja-claro); border-top: 1px solid #fde68a; padding: 0.55rem 1.5rem; }
  .header-meta-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; font-size: 0.83rem; color: #92400e; font-weight: 500; }
  .barra-wrap { position: sticky; top: 0; z-index: 100; background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0.6rem 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .barra-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
  .barra-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .barra-fill { height: 100%; background: var(--naranja); border-radius: 99px; transition: width 0.35s ease; width: 0%; }
  .barra-num { font-size: 13px; font-weight: 600; color: var(--azul-oscuro); white-space: nowrap; min-width: 52px; }
  .barra-score { font-size: 13px; color: var(--texto-suave); white-space: nowrap; }
  .barra-score .ok { color: var(--verde); font-weight: 600; }
  .barra-score .ko { color: var(--rojo); font-weight: 600; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .card { background: var(--blanco); border: 1px solid var(--borde); border-radius: 10px; padding: 1.5rem 1.6rem; margin-bottom: 1.4rem; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
  .card-num { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--naranja); margin-bottom: 0.5rem; }
  .card-pregunta { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; line-height: 1.55; color: var(--azul-oscuro); margin-bottom: 1.1rem; }
  .opciones { display: flex; flex-direction: column; gap: 0.45rem; }
  .opcion { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.7rem 1rem; border: 1.5px solid var(--borde); border-radius: 7px; cursor: pointer; background: var(--blanco); text-align: left; font-family: 'Source Sans 3', sans-serif; font-size: 0.93rem; color: var(--texto); line-height: 1.5; transition: border-color 0.15s, background 0.15s; width: 100%; }
  .opcion:hover:not(:disabled) { border-color: var(--naranja-borde); background: var(--naranja-claro); }
  .opcion .letra { font-weight: 700; color: var(--naranja); min-width: 18px; font-size: 0.85rem; margin-top: 2px; flex-shrink: 0; }
  .opcion.correcta { border-color: var(--verde-borde); background: var(--verde-bg); color: var(--verde); }
  .opcion.correcta .letra { color: #15803d; }
  .opcion.incorrecta { border-color: var(--rojo-borde); background: var(--rojo-bg); color: var(--rojo); }
  .opcion.incorrecta .letra { color: var(--rojo); }
  .opcion:disabled { cursor: default; }
  .explicacion { display: none; margin-top: 1rem; padding: 0.9rem 1rem 0.9rem 1.1rem; background: #fffbeb; border-left: 3px solid var(--naranja); border-radius: 0 6px 6px 0; font-size: 0.875rem; line-height: 1.65; color: var(--texto); }
  .explicacion.visible { display: block; animation: fadeIn 0.22s ease; }
  .explicacion strong { color: var(--azul-oscuro); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .resultado { display: none; background: var(--blanco); border: 1px solid var(--borde); border-radius: 12px; padding: 2.5rem 2rem 2rem; margin: 1.5rem 0 2rem; text-align: center; }
  .resultado.visible { display: block; animation: fadeIn 0.3s ease; }
  .resultado-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--naranja); font-weight: 600; margin-bottom: 0.5rem; }
  .resultado h2 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 700; color: var(--azul-oscuro); margin-bottom: 0.3rem; }
  .resultado-nota { font-size: 3.2rem; font-weight: 700; color: var(--azul-oscuro); line-height: 1; margin: 1rem 0 0.3rem; font-family: 'Lora', serif; }
  .resultado-nota span { color: var(--naranja); }
  .calif-badge { display: inline-block; padding: 5px 16px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; margin: 0.6rem 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 0 0 1.5rem; }
  .stat { background: var(--fondo); border: 1px solid var(--borde); border-radius: 8px; padding: 0.9rem 0.5rem; }
  .stat-num { font-size: 1.9rem; font-weight: 700; font-family: 'Lora', serif; }
  .stat-lab { font-size: 0.78rem; color: var(--texto-suave); margin-top: 2px; }
  .resultado-hint { font-size: 0.85rem; color: var(--texto-suave); margin-bottom: 1.2rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.7rem 1.6rem; border-radius: 7px; font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
  .btn-naranja { background: var(--naranja); color: white; }
  .btn-naranja:hover { background: #b45309; transform: translateY(-1px); }
  .divider { text-align: center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--texto-suave); margin: 2rem 0 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--borde); }
  @media (max-width: 580px) { main { padding: 1.2rem 1rem 4rem; } .card { padding: 1.1rem; } .stats { grid-template-columns: 1fr 1fr; } .header-top { padding: 1rem; gap: 0.8rem; } .header-meta { padding: 0.5rem 1rem; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <img class="header-logo"
      src="https://opositorgva.wordpress.com/wp-content/uploads/2024/04/cropped-opositar-en-valencia-logo-sin-fondo.png"
      alt="Opositar en Valencia" onerror="this.style.display='none'">
    <div class="header-textos">
      <div class="header-site">Opositar en Valencia · GVA · Parte Específica</div>
      <div class="header-titulo">Tema 2 — Actos Administrativos y Órganos de las AAPP</div>
      <div class="header-sub">Ley 39/2015 Títulos III (Cap. I y II) · Ley 40/2015 Cap. II · Subalterno APT-APF</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="header-meta-inner">
      <span>📋 50 preguntas</span>
      <span>🎯 Nivel medio-alto</span>
      <span>🔀 Orden aleatorio en cada intento</span>
      <span>✅ Explicación en cada respuesta</span>
    </div>
  </div>
</header>

<div class="barra-wrap">
  <div class="barra-inner">
    <div class="barra-track"><div class="barra-fill" id="barraFill"></div></div>
    <span class="barra-num" id="barraNum">0 / 50</span>
    <span class="barra-score"><span class="ok" id="scoreOk">✓ 0</span> &nbsp;<span class="ko" id="scoreKo">✗ 0</span></span>
  </div>
</div>

<main id="mainContent"></main>

<script>
const BANCO = [
  // ── TÍTULO III CAP. I — REQUISITOS ACTOS ──
  {
    p: "Según el artículo 34.1 de la Ley 39/2015, ¿quién produce los actos administrativos?",
    ops: ["Cualquier empleado público que actúe en nombre de la Administración", "El órgano competente, ajustándose a los requisitos y al procedimiento establecido", "El titular del Departamento ministerial o Conselleria responsable, en todo caso", "El órgano superior jerárquico, salvo delegación expresa en órganos inferiores"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 34.1 de la Ley 39/2015 establece que los actos administrativos que dicten las Administraciones Públicas, bien de oficio o a instancia del interesado, se producirán por el órgano competente ajustándose a los requisitos y al procedimiento establecido. La competencia es el presupuesto subjetivo de validez del acto administrativo."
  },
  {
    p: "¿Cuántos supuestos de motivación obligatoria de actos administrativos enumera el artículo 35.1 de la Ley 39/2015?",
    ops: ["Seis supuestos", "Siete supuestos", "Nueve supuestos", "Once supuestos"],
    c: 2,
    exp: "<strong>Respuesta correcta: C.</strong> El art. 35.1 de la Ley 39/2015 enumera nueve supuestos (letras a a i) en los que los actos deben ser motivados con sucinta referencia de hechos y fundamentos de derecho: actos que limitan derechos, actos en procedimientos de revisión y recursos, actos que se apartan de criterios precedentes o de dictámenes consultivos, acuerdos de suspensión y medidas provisionales, acuerdos sobre tramitación urgencia/ampliación plazos/actuaciones complementarias, rechazo de pruebas, terminación por causas sobrevenidas y desistimiento de oficio, propuestas de resolución sancionadora y resoluciones sancionadoras o de responsabilidad patrimonial, y actos discrecionales o los que deban motivarse por disposición legal o reglamentaria."
  },
  {
    p: "¿Están obligados a motivarse los actos que se apartan del dictamen de órganos consultivos, según el artículo 35.1.c) de la Ley 39/2015?",
    ops: ["No, la motivación solo es exigible cuando se sigue el dictamen, no cuando se aparta de él", "Sí, los actos que se separen del criterio seguido en actuaciones precedentes o del dictamen de órganos consultivos deben ser motivados", "Solo cuando el órgano consultivo así lo exija expresamente en su propio dictamen", "Solo si el dictamen era preceptivo y vinculante para el órgano que dicta el acto"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 35.1.c) de la Ley 39/2015 establece que deben ser motivados los actos que se separen del criterio seguido en actuaciones precedentes o del dictamen de órganos consultivos. Esta exigencia garantiza la coherencia de la actuación administrativa y obliga a justificar los cambios de criterio, siendo especialmente relevante cuando el órgano activo no sigue el parecer del consultivo."
  },
  {
    p: "¿Deben motivarse los actos que rechacen pruebas propuestas por los interesados, según el artículo 35.1.f) de la Ley 39/2015?",
    ops: ["No, el rechazo de pruebas es una decisión discrecional del instructor que no requiere motivación", "Sí, los actos que rechacen pruebas propuestas por los interesados deben ser motivados", "Solo si las pruebas rechazadas eran documentales; el rechazo de pruebas periciales no requiere motivación", "Solo en los procedimientos sancionadores, no en los procedimientos ordinarios de autorización o reconocimiento de derechos"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 35.1.f) de la Ley 39/2015 establece expresamente que deben motivarse los actos que rechacen pruebas propuestas por los interesados. Esta exigencia de motivación protege el derecho de defensa del interesado, que puede así conocer las razones por las que sus medios de prueba no han sido admitidos y, en su caso, impugnar dicha decisión."
  },
  {
    p: "Según el artículo 35.2 de la Ley 39/2015, ¿cómo se motivan los actos que ponen fin a procedimientos selectivos y de concurrencia competitiva?",
    ops: ["Mediante una motivación exhaustiva e individualizada para cada candidato o concurrente", "De conformidad con lo que dispongan las normas que regulen sus convocatorias, debiendo quedar acreditados en el procedimiento los fundamentos de la resolución", "Solo mediante la publicación de la puntuación total obtenida por cada aspirante en el diario oficial correspondiente", "Mediante un informe del órgano de selección que debe ser ratificado por el órgano convocante"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 35.2 de la Ley 39/2015 establece una regla especial: la motivación de los actos que pongan fin a procedimientos selectivos y de concurrencia competitiva se realizará de conformidad con lo que dispongan las normas que regulen sus convocatorias, debiendo en todo caso quedar acreditados en el procedimiento los fundamentos de la resolución que se adopte."
  },
  {
    p: "¿En qué forma deben producirse los actos administrativos con carácter general, según el artículo 36.1 de la Ley 39/2015?",
    ops: ["Por escrito en soporte papel, con firma manuscrita del titular del órgano competente", "Por escrito a través de medios electrónicos, salvo que su naturaleza exija otra forma más adecuada de expresión y constancia", "En la forma que el órgano competente estime más adecuada según las circunstancias del caso", "Verbalmente, cuando así lo autorice el superior jerárquico del órgano emisor"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 36.1 de la Ley 39/2015 establece que los actos administrativos se producirán por escrito a través de medios electrónicos, a menos que su naturaleza exija otra forma más adecuada de expresión y constancia. La forma escrita electrónica es la regla general; la excepción son los actos verbales cuando la naturaleza del asunto así lo requiera."
  },
  {
    p: "Cuando los órganos administrativos ejerzan su competencia de forma verbal, ¿quién firma la constancia escrita del acto y qué debe expresar, según el artículo 36.2 de la Ley 39/2015?",
    ops: ["El propio titular del órgano que emite la orden verbal, en un documento posterior que debe notificarse al interesado", "El titular del órgano inferior o funcionario que la recibe oralmente, expresando en la comunicación la autoridad de la que procede", "Un fedatario público designado por el órgano emisor, con indicación del contenido íntegro del acto verbal", "El Secretario del órgano colegiado competente, que levanta acta de la decisión verbal adoptada"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 36.2 de la Ley 39/2015 establece que cuando los órganos ejerzan su competencia verbalmente, la constancia escrita se efectuará y firmará por el titular del órgano inferior o funcionario que la reciba oralmente, expresando en la comunicación la autoridad de la que procede. Si se tratara de resoluciones, el titular de la competencia deberá autorizar una relación de las dictadas verbalmente."
  },
  // ── TÍTULO III CAP. II — EFICACIA ──
  {
    p: "Según el artículo 37.1 de la Ley 39/2015, ¿puede una resolución de carácter particular vulnerar lo establecido en una disposición de carácter general aunque proceda de un órgano de igual o superior jerarquía?",
    ops: ["Sí, si el órgano es jerárquicamente superior al que dictó la disposición general", "No, las resoluciones administrativas de carácter particular no podrán vulnerar lo establecido en una disposición de carácter general, aunque aquéllas procedan de un órgano de igual o superior jerarquía", "Solo puede hacerlo si así lo autoriza expresamente el órgano supremo de la Administración correspondiente", "Solo cuando la disposición general sea anterior a la entrada en vigor de la Constitución Española de 1978"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 37.1 de la Ley 39/2015 consagra el principio de inderogabilidad singular: las resoluciones administrativas de carácter particular no podrán vulnerar lo establecido en una disposición de carácter general, aunque aquéllas procedan de un órgano de igual o superior jerarquía al que dictó la disposición. Ningún acto singular puede excepcionar la norma general."
  },
  {
    p: "¿Desde qué momento producen efectos los actos de las Administraciones Públicas, según la regla general del artículo 39.1 de la Ley 39/2015?",
    ops: ["Desde el momento en que son notificados al interesado o publicados en el diario oficial correspondiente", "Desde la fecha en que se dicten, salvo que en ellos se disponga otra cosa", "Desde que adquieren firmeza, al agotarse la vía administrativa o el plazo de recurso", "Desde que son inscritos en el registro del órgano competente y se asigna número de expediente"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 39.1 de la Ley 39/2015 establece la regla general: los actos de las Administraciones Públicas sujetos al Derecho Administrativo se presumirán válidos y producirán efectos desde la fecha en que se dicten, salvo que en ellos se disponga otra cosa. La validez y la eficacia son dos cualidades distintas; el acto puede ser válido desde que se dicta aunque su eficacia quede demorada."
  },
  {
    p: "¿En qué supuestos puede otorgarse eficacia retroactiva a los actos administrativos, según el artículo 39.3 de la Ley 39/2015?",
    ops: ["En cualquier caso, cuando el órgano competente así lo decida motivadamente", "Excepcionalmente, cuando se dicten en sustitución de actos anulados, o cuando produzcan efectos favorables al interesado, siempre que los supuestos de hecho necesarios existieran ya y no se lesionen derechos o intereses legítimos de otras personas", "Solo cuando lo solicite expresamente el interesado y lo autorice el órgano superior jerárquico", "Solo en actos favorables al interesado, sin necesidad de que concurra ningún otro requisito adicional"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 39.3 de la Ley 39/2015 establece que excepcionalmente puede otorgarse eficacia retroactiva a los actos en dos supuestos: cuando se dicten en sustitución de actos anulados, y cuando produzcan efectos favorables al interesado. En este segundo caso deben concurrir dos condiciones: que los supuestos de hecho necesarios existieran ya en la fecha de retroacción y que no se lesionen derechos o intereses legítimos de terceros."
  },
  {
    p: "Según el artículo 40.2 de la Ley 39/2015, ¿en qué plazo debe cursarse toda notificación desde que el acto haya sido dictado?",
    ops: ["Dentro del plazo de cinco días hábiles desde la fecha en que el acto haya sido dictado", "Dentro del plazo de diez días a partir de la fecha en que el acto haya sido dictado", "Dentro del plazo de quince días naturales desde que el acto se haya firmado", "Dentro del plazo de un mes desde que el acto adquiera firmeza administrativa"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 40.2 de la Ley 39/2015 establece que toda notificación deberá ser cursada dentro del plazo de diez días a partir de la fecha en que el acto haya sido dictado. Además, la notificación deberá contener el texto íntegro de la resolución, indicar si pone fin a la vía administrativa, expresar los recursos que procedan y el órgano ante el que presentarlos, y el plazo para interponerlos."
  },
  {
    p: "¿Qué ocurre cuando una notificación contiene el texto íntegro del acto pero omite alguno de los demás requisitos legales, según el artículo 40.3 de la Ley 39/2015?",
    ops: ["La notificación es nula de pleno derecho y debe repetirse con todos los requisitos", "Surtirá efecto a partir de la fecha en que el interesado realice actuaciones que supongan el conocimiento del contenido del acto o interponga cualquier recurso que proceda", "El plazo para recurrir no empezará a computarse hasta que se subsanen las omisiones", "El interesado puede solicitar la nulidad de la notificación ante el órgano superior jerárquico en el plazo de un mes"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 40.3 de la Ley 39/2015 establece que las notificaciones que, conteniendo el texto íntegro del acto, omitan alguno de los demás requisitos, surtirán efecto a partir de la fecha en que el interesado realice actuaciones que supongan el conocimiento del contenido y alcance de la resolución, o interponga cualquier recurso que proceda. Es la llamada 'subsanación por conocimiento'."
  },
  {
    p: "¿Por qué vía deben practicarse preferentemente las notificaciones, según el artículo 41.1 de la Ley 39/2015?",
    ops: ["Por correo postal certificado con acuse de recibo, como medio de mayor garantía jurídica", "Por medios electrónicos, y en todo caso cuando el interesado resulte obligado a recibirlas por esta vía", "Por entrega directa de un empleado público de la Administración notificante", "Por publicación en el diario oficial correspondiente, como forma más segura de notificación"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 41.1 de la Ley 39/2015 establece que las notificaciones se practicarán preferentemente por medios electrónicos y, en todo caso, cuando el interesado resulte obligado a recibirlas por esta vía. Fuera de los dos supuestos de excepción (comparecencia espontánea y necesidad de eficacia mediante entrega directa), la vía electrónica es la regla general."
  },
  {
    p: "¿En qué dos supuestos pueden las Administraciones practicar notificaciones por medios no electrónicos, según el artículo 41.1 de la Ley 39/2015?",
    ops: ["Cuando el interesado sea mayor de 65 años, o cuando la notificación verse sobre un expediente sancionador", "Cuando la notificación se realice con ocasión de la comparecencia espontánea del interesado en las oficinas de asistencia en materia de registro, o cuando para asegurar la eficacia resulte necesario practicarla por entrega directa de un empleado público", "Cuando el interesado carezca de dirección de correo electrónico activa, o cuando el domicilio esté en el extranjero", "Cuando el órgano instructor así lo decida, o cuando el volumen de notificaciones electrónicas supere la capacidad del sistema"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 41.1 de la Ley 39/2015 prevé dos supuestos de excepción para practicar notificaciones no electrónicas: a) cuando la notificación se realice con ocasión de la comparecencia espontánea del interesado o su representante en las oficinas de asistencia en materia de registro y solicite la comunicación personal en ese momento; b) cuando para asegurar la eficacia de la actuación administrativa resulte necesario practicarla por entrega directa de un empleado público."
  },
  {
    p: "¿Qué sucede cuando el interesado rechaza la notificación de una actuación administrativa, según el artículo 41.5 de la Ley 39/2015?",
    ops: ["El procedimiento queda suspendido hasta que el interesado acepte la notificación o sea notificado por edicto", "Se hará constar en el expediente, especificándose las circunstancias del intento de notificación y el medio, dando por efectuado el trámite y siguiéndose el procedimiento", "La Administración debe intentar la notificación por un medio alternativo antes de dar por efectuado el trámite", "El acto notificado queda sin efecto hasta que sea aceptado expresamente por el interesado"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 41.5 de la Ley 39/2015 establece que cuando el interesado o su representante rechace la notificación, se hará constar en el expediente, especificándose las circunstancias del intento de notificación y el medio utilizado, dando por efectuado el trámite y siguiéndose el procedimiento. El rechazo no puede impedir la continuación del procedimiento ni proteger al interesado de los efectos del acto notificado."
  },
  {
    p: "¿Qué sucede con la validez de la notificación cuando el interesado no ha recibido el aviso previo al dispositivo electrónico, según el artículo 41.6 de la Ley 39/2015?",
    ops: ["La notificación es nula y debe repetirse, enviando primero el aviso de forma fehaciente", "La falta de práctica de este aviso no impedirá que la notificación sea considerada plenamente válida", "La notificación queda suspendida hasta que el aviso sea efectivamente recibido por el interesado", "La falta de aviso solo afecta al cómputo del plazo de notificación, que no empieza hasta que se envíe el aviso"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 41.6 de la Ley 39/2015 establece que, aunque las Administraciones enviarán un aviso al dispositivo electrónico y/o dirección de correo electrónico del interesado informándole de la puesta a disposición de una notificación, la falta de práctica de este aviso no impedirá que la notificación sea considerada plenamente válida. El aviso es una medida de cortesía pero no un requisito de validez."
  },
  {
    p: "Cuando se realiza la notificación en papel en el domicilio y no está el interesado, ¿quién puede hacerse cargo de la notificación y cuántos intentos se realizan, según el artículo 42.2 de la Ley 39/2015?",
    ops: ["Solo el cónyuge o pareja de hecho del interesado; si no está, se realiza un único reintento al día siguiente", "Cualquier persona mayor de catorce años que se encuentre en el domicilio y haga constar su identidad; si nadie se hace cargo, se repite por una sola vez en una hora distinta dentro de los tres días siguientes", "Cualquier persona mayor de dieciocho años empadronada en el domicilio; si no está, se realizan dos reintentos en días distintos", "Solo personas mayores de edad que acrediten relación de parentesco; si no, se pasa directamente a la notificación edictal"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 42.2 de la Ley 39/2015 establece que si el interesado no está en el domicilio, podrá hacerse cargo de la notificación cualquier persona mayor de catorce años que se encuentre allí y haga constar su identidad. Si nadie se hace cargo, se hará constar en el expediente y se reintentará por una sola vez en una hora distinta dentro de los tres días siguientes. Si el primer intento fue antes de las 15h, el segundo debe ser después de las 15h (y viceversa), con al menos tres horas de diferencia."
  },
  {
    p: "¿Cuándo se entiende rechazada la notificación electrónica obligatoria o expresamente elegida por el interesado, según el artículo 43.2 de la Ley 39/2015?",
    ops: ["Cuando hayan transcurrido cinco días naturales desde la puesta a disposición sin acceso", "Cuando hayan transcurrido diez días naturales desde la puesta a disposición de la notificación sin que se acceda a su contenido", "Cuando hayan transcurrido quince días hábiles desde la puesta a disposición sin que el interesado la haya abierto", "Cuando hayan transcurrido treinta días desde que el interesado fue informado por correo del envío de la notificación"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 43.2 de la Ley 39/2015 establece que cuando la notificación por medios electrónicos sea obligatoria o haya sido expresamente elegida por el interesado, se entenderá rechazada cuando hayan transcurrido diez días naturales desde la puesta a disposición de la notificación sin que se acceda a su contenido. Transcurrido ese plazo, la notificación produce plenos efectos jurídicos."
  },
  {
    p: "¿Dónde se publica la notificación infructuosa cuando los interesados son desconocidos o se ignora el lugar de notificación, según el artículo 44 de la Ley 39/2015?",
    ops: ["En el tablón de edictos del Ayuntamiento del último domicilio conocido del interesado", "En el «Boletín Oficial del Estado», siendo la publicación previa en boletines autonómicos o provinciales y tablones de edictos meramente facultativa", "En el boletín oficial de la Comunidad Autónoma o de la Provincia donde radique el órgano que dictó el acto", "En la sede electrónica del órgano que dictó el acto y, subsidiariamente, en el BOE"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 44 de la Ley 39/2015 establece que cuando la notificación sea infructuosa, se hará por anuncio publicado en el «Boletín Oficial del Estado». Con carácter facultativo y previo, las Administraciones podrán publicar también en el boletín oficial de la CCAA o Provincia, en el tablón de edictos del Ayuntamiento del último domicilio, o en el Consulado correspondiente. La publicación en el BOE es el único trámite obligatorio."
  },
  {
    p: "¿En qué supuestos deben publicarse los actos administrativos sustituyendo a la notificación individual, según el artículo 45.1 de la Ley 39/2015?",
    ops: ["Siempre que el acto tenga efectos colectivos, y en los procedimientos de concurrencia competitiva", "Cuando el acto tenga destinatario indeterminado o la notificación a un solo interesado sea insuficiente, y cuando se trate de actos de procedimientos selectivos o de concurrencia competitiva", "Solo en los procedimientos selectivos de acceso al empleo público y en los procedimientos de concesión de subvenciones", "Cuando así lo decida motivadamente el órgano competente por razones de eficacia administrativa"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 45.1 de la Ley 39/2015 establece dos supuestos en los que la publicación surte efectos de notificación: a) cuando el acto tenga por destinatario una pluralidad indeterminada de personas o la Administración estime insuficiente la notificación individual; b) cuando se trate de actos de procedimientos selectivos o de concurrencia competitiva, en cuyo caso la convocatoria debe indicar el medio donde se realizarán las publicaciones."
  },
  {
    p: "Según el artículo 46 de la Ley 39/2015, ¿qué ocurre cuando la publicación de un acto podría lesionar derechos o intereses legítimos?",
    ops: ["El acto no puede hacerse público bajo ninguna circunstancia; solo se notifica individualmente al afectado", "Se limitará a publicar en el Diario oficial una somera indicación del contenido del acto y el lugar donde los interesados podrán comparecer para conocer el contenido íntegro", "El órgano competente debe obtener autorización del Delegado del Gobierno o del Consell antes de publicar", "El acto se archiva sin publicidad hasta que el Tribunal Constitucional resuelva la posible lesión de derechos"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 46 de la Ley 39/2015 establece que si el órgano aprecia que la notificación por anuncios o la publicación lesiona derechos o intereses legítimos, se limitará a publicar en el Diario oficial correspondiente una somera indicación del contenido del acto y el lugar donde los interesados podrán comparecer en el plazo establecido para conocer el contenido íntegro y dejar constancia de ese conocimiento."
  },
  // ── LEY 40/2015 ──
  {
    p: "¿Qué requisito funcional deben cumplir las unidades administrativas para tener la consideración de órganos administrativos, según el artículo 5.1 de la Ley 40/2015?",
    ops: ["Disponer de personal propio y presupuesto diferenciado dentro de la estructura de la Administración", "Que se les atribuyan funciones que tengan efectos jurídicos frente a terceros, o cuya actuación tenga carácter preceptivo", "Estar dirigidas por un funcionario de carrera del grupo A1 nombrado mediante concurso de méritos", "Estar recogidas expresamente en el organigrama oficial aprobado mediante norma con rango de ley"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 5.1 de la Ley 40/2015 establece que tendrán la consideración de órganos administrativos las unidades administrativas a las que se les atribuyan funciones que tengan efectos jurídicos frente a terceros, o cuya actuación tenga carácter preceptivo. La clave es la proyección jurídica externa o el carácter preceptivo de su intervención."
  },
  {
    p: "¿Cuántos requisitos mínimos exige el artículo 5.3 de la Ley 40/2015 para la creación de cualquier órgano administrativo?",
    ops: ["Dos requisitos: determinación de funciones y dotación presupuestaria", "Tres requisitos: forma de integración y dependencia jerárquica; delimitación de funciones y competencias; dotación de créditos necesarios", "Cuatro requisitos, incluyendo también la aprobación por el órgano superior jerárquico competente", "Un único requisito: que el nuevo órgano no duplique funciones de órganos ya existentes"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 5.3 de la Ley 40/2015 exige al menos tres requisitos para crear un órgano administrativo: a) determinación de su forma de integración en la Administración y su dependencia jerárquica; b) delimitación de sus funciones y competencias; c) dotación de los créditos necesarios para su puesta en marcha y funcionamiento. El incumplimiento de cualquiera de ellos impide la creación válida del órgano."
  },
  {
    p: "Según el artículo 5.4 de la Ley 40/2015, ¿pueden crearse nuevos órganos que supongan duplicación de otros ya existentes?",
    ops: ["Sí, siempre que el nuevo órgano tenga alguna especialidad funcional que lo diferencie del existente", "No, sin suprimir o restringir debidamente la competencia de los preexistentes; la creación de un nuevo órgano solo tendrá lugar previa comprobación de que no existe otro que desarrolle igual función sobre el mismo territorio y población", "Sí, cuando así lo justifique una memoria de análisis económico del impacto normativo aprobada por el Consell", "Solo pueden crearse si los nuevos órganos tienen competencia territorial diferenciada de los ya existentes"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 5.4 de la Ley 40/2015 prohíbe crear nuevos órganos que supongan duplicación de otros ya existentes si al mismo tiempo no se suprime o restringe debidamente la competencia de éstos. La creación de un nuevo órgano solo tendrá lugar previa comprobación de que no existe otro en la misma Administración que desarrolle igual función sobre el mismo territorio y población."
  },
  {
    p: "¿Puede el incumplimiento de instrucciones u órdenes de servicio afectar por sí solo a la validez de los actos dictados, según el artículo 6.2 de la Ley 40/2015?",
    ops: ["Sí, el incumplimiento de instrucciones genera siempre la nulidad del acto dictado en contravención", "No, el incumplimiento de las instrucciones u órdenes de servicio no afecta por sí solo a la validez de los actos, sin perjuicio de la responsabilidad disciplinaria en que se pueda incurrir", "Solo afecta a la validez si las instrucciones habían sido publicadas en el boletín oficial correspondiente", "Solo afecta a la validez cuando el incumplimiento causó un perjuicio objetivo a los interesados en el procedimiento"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 6.2 de la Ley 40/2015 establece que el incumplimiento de las instrucciones u órdenes de servicio no afecta por sí solo a la validez de los actos dictados por los órganos administrativos, sin perjuicio de la responsabilidad disciplinaria en que se pueda incurrir. La validez del acto y la responsabilidad disciplinaria del funcionario son consecuencias jurídicas independientes."
  },
  {
    p: "Según el artículo 8.1 de la Ley 40/2015, ¿con qué carácter es la competencia y cuándo puede delegarse su ejercicio?",
    ops: ["La competencia es renunciable cuando el órgano la estima inconveniente; solo puede delegarse cuando así lo autorice expresamente la ley", "La competencia es irrenunciable y se ejercerá por los órganos que la tengan atribuida como propia, salvo los casos de delegación o avocación en los términos previstos en la ley", "La competencia es transferible mediante acuerdo entre órganos del mismo nivel jerárquico, sin necesidad de habilitación legal", "La competencia puede ser ejercida por cualquier órgano de la Administración cuando el titular esté ausente o enfermo"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 8.1 de la Ley 40/2015 establece el principio de irrenunciabilidad de la competencia: es irrenunciable y se ejercerá por los órganos administrativos que la tengan atribuida como propia, salvo los casos de delegación o avocación cuando se efectúen en los términos previstos en la ley. La delegación, la encomienda, la delegación de firma y la suplencia no suponen alteración de la titularidad."
  },
  {
    p: "¿En qué órganos pueden delegar sus competencias los órganos de las Administraciones Públicas, según el artículo 9.1 de la Ley 40/2015?",
    ops: ["Solo en órganos jerárquicamente dependientes de la misma Administración", "En otros órganos de la misma Administración, aun cuando no sean jerárquicamente dependientes, o en los Organismos públicos o Entidades de Derecho Público vinculados o dependientes de aquéllas", "Solo en órganos que tengan competencia en la misma materia y el mismo ámbito territorial", "Exclusivamente en órganos del mismo Ministerio o Conselleria, nunca entre Departamentos distintos"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 9.1 de la Ley 40/2015 establece que los órganos de las Administraciones Públicas podrán delegar el ejercicio de las competencias que tengan atribuidas en otros órganos de la misma Administración, aun cuando no sean jerárquicamente dependientes, o en los Organismos públicos o Entidades de Derecho Público vinculados o dependientes de aquéllas."
  },
  {
    p: "¿Cuáles son las materias expresamente excluidas de la delegación de competencias, según el artículo 9.2 de la Ley 40/2015?",
    ops: ["Las competencias en materia sancionadora, las que afecten a derechos fundamentales y las que impliquen aprobación de presupuestos", "Los asuntos que se refieran a relaciones con la Jefatura del Estado, la Presidencia del Gobierno, las Cortes Generales y los Presidentes y Asambleas legislativas de las CCAA; la adopción de disposiciones de carácter general; la resolución de recursos por el órgano que dictó el acto recurrido; y las materias excluidas por norma con rango de ley", "Las competencias en materia de nombramientos, las potestades inspectoras y las actuaciones de carácter reservado", "Todas las competencias atribuidas directamente por la Constitución o los Estatutos de Autonomía"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 9.2 de la Ley 40/2015 enumera cuatro supuestos no delegables: a) asuntos referidos a relaciones con la Jefatura del Estado, Presidencia del Gobierno, Cortes Generales y Presidencias/Asambleas de las CCAA; b) adopción de disposiciones de carácter general; c) resolución de recursos por los órganos que dictaron los actos impugnados; d) materias en que así lo determine una norma con rango de ley."
  },
  {
    p: "¿En qué diario oficial deben publicarse las delegaciones de competencias y su revocación, según el artículo 9.3 de la Ley 40/2015?",
    ops: ["Siempre en el Boletín Oficial del Estado, con independencia del ámbito territorial de la competencia delegada", "En el BOE, en el de la Comunidad Autónoma o en el de la Provincia, según la Administración a que pertenezca el órgano delegante y el ámbito territorial de su competencia", "Solo en la sede electrónica del órgano delegante, sin necesidad de publicación en diario oficial", "En el boletín oficial de la Provincia, con independencia del nivel de la Administración que realiza la delegación"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 9.3 de la Ley 40/2015 establece que las delegaciones de competencias y su revocación deberán publicarse en el BOE, en el de la Comunidad Autónoma o en el de la Provincia, según la Administración a que pertenezca el órgano delegante y el ámbito territorial de competencia de éste. La publicación es requisito de eficacia de la delegación."
  },
  {
    p: "¿Cómo deben dictarse las resoluciones adoptadas por delegación, y a qué órgano se consideran imputables, según el artículo 9.4 de la Ley 40/2015?",
    ops: ["Deben dictarse en nombre del órgano delegado e imputarse al propio órgano delegado, que asume la responsabilidad plena del acto", "Indicarán expresamente la circunstancia de la delegación y se considerarán dictadas por el órgano delegante", "Se dictan en nombre del órgano superior jerárquico común al delegante y al delegado", "Deben indicar tanto el órgano delegante como el delegado, siendo ambos responsables solidariamente del acto"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 9.4 de la Ley 40/2015 establece que las resoluciones administrativas que se adopten por delegación indicarán expresamente esta circunstancia y se considerarán dictadas por el órgano delegante. Esto significa que el recurso contra la resolución debe interponerse ante el órgano delegante (o el superior), no ante el órgano que firmó el acto."
  },
  {
    p: "Según el artículo 9.5 de la Ley 40/2015, ¿puede delegarse una competencia que ya se ejerce por delegación?",

    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 9.5 de la Ley 40/2015 establece que, salvo autorización expresa de una ley, no podrán delegarse las competencias que se ejerzan por delegación. Esta prohibición de subdelegación garantiza el control de la cadena de delegaciones y evita que la competencia quede demasiado alejada del órgano originalmente competente."
  },
  {
    p: "¿Cuándo puede un órgano superior avocar para sí el conocimiento de un asunto que corresponde a un órgano dependiente, según el artículo 10.1 de la Ley 40/2015?",
    ops: ["Solo cuando exista delegación de competencias previa del órgano superior al inferior", "Cuando circunstancias de índole técnica, económica, social, jurídica o territorial lo hagan conveniente", "Solo en procedimientos de urgencia y con autorización del órgano superior jerárquico del avocante", "Cuando el órgano inferior lleve más de seis meses sin resolver el asunto sin causa justificada"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 10.1 de la Ley 40/2015 establece que los órganos superiores podrán avocar para sí el conocimiento de asuntos cuya resolución corresponda ordinariamente o por delegación a sus órganos dependientes, cuando circunstancias de índole técnica, económica, social, jurídica o territorial lo hagan conveniente. En el caso de delegación en órganos no dependientes, solo puede avocar el órgano delegante."
  },
  {
    p: "¿Cabe recurso contra el acuerdo de avocación, según el artículo 10.2 de la Ley 40/2015?",
    ops: ["Sí, puede recurrirse directamente ante la jurisdicción contencioso-administrativa en el plazo de dos meses", "No, contra el acuerdo de avocación no cabrá recurso, aunque podrá impugnarse en el recurso que en su caso se interponga contra la resolución del procedimiento", "Sí, cabe recurso de alzada ante el órgano superior jerárquico del órgano avocante", "No, la avocación es un acto interna corporis no susceptible de impugnación por los interesados"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 10.2 de la Ley 40/2015 establece que contra el acuerdo de avocación no cabrá recurso, aunque podrá impugnarse en el que, en su caso, se interponga contra la resolución del procedimiento. Además, la avocación se realizará mediante acuerdo motivado que deberá ser notificado a los interesados con anterioridad o simultáneamente a la resolución final."
  },
  {

    ops: ["Actividades de carácter jurídico-decisorio, como la resolución de expedientes y la adopción de actos administrativos", "Actividades de carácter material o técnico de la competencia de los órganos administrativos, por razones de eficacia o cuando no se posean los medios técnicos idóneos", "Solo actividades de mantenimiento y conservación de inmuebles y bienes muebles de la Administración", "Cualquier actividad de la Administración, incluyendo las que son propias de los contratos del sector público"],

    exp: "<strong>Respuesta correcta: B.</strong> El art. 11.1 de la Ley 40/2015 limita la encomienda de gestión a actividades de carácter material o técnico (no jurídico-decisorio) de la competencia de los órganos administrativos o Entidades de Derecho Público, por razones de eficacia o cuando no se posean los medios técnicos idóneos. Expresamente no pueden ser objeto de encomienda las prestaciones propias de los contratos del sector público."
  },
  {
    p: "Según el artículo 11.2 de la Ley 40/2015, ¿supone la encomienda de gestión cesión de la titularidad de la competencia?",
    ops: ["Sí, la encomienda transfiere tanto la titularidad como el ejercicio de la competencia al órgano encomendado", "No, la encomienda no supone cesión de la titularidad de la competencia ni de los elementos sustantivos de su ejercicio; la responsabilidad de dictar los actos jurídicos que den soporte a la actividad material encargada sigue correspondiendo al órgano encomendante", "Solo transfiere el ejercicio, no la titularidad, por lo que los recursos deben interponerse ante el órgano encomendado", "Supone una cesión temporal de la titularidad, que se recupera automáticamente al concluir la encomienda"],
    c: 1,

  },
  {

    ops: ["Mediante resolución del órgano encomendante, sin necesidad de acuerdo con la otra Administración", "Mediante firma del correspondiente convenio entre ellas, que deberá publicarse en el BOE, en el boletín de la CCAA o en el de la Provincia, según la Administración del órgano encomendante", "Mediante acuerdo del Consejo de Ministros o del Consell, según corresponda, con comunicación a la otra Administración", "Mediante contrato administrativo suscrito entre las dos Administraciones, sujeto a la normativa de contratación pública"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 11.3.b) de la Ley 40/2015 establece que cuando la encomienda de gestión se realice entre órganos y Entidades de Derecho Público de distintas Administraciones se formalizará mediante firma del correspondiente convenio entre ellas, que deberá publicarse en el BOE, en el boletín de la CCAA o en el de la Provincia, según la Administración del órgano encomendante."
  },
  {
    p: "¿Necesita ser publicada la delegación de firma para su validez, según el artículo 12.2 de la Ley 40/2015?",
    ops: ["Sí, debe publicarse en el boletín oficial correspondiente para que surta efectos frente a terceros", "No, la delegación de firma no altera la competencia del órgano delegante y para su validez no será necesaria su publicación", "Solo debe publicarse si afecta a procedimientos que tienen impacto en derechos de los ciudadanos", "Solo debe comunicarse a la unidad de registro del órgano correspondiente, sin publicación externa"],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 12.2 de la Ley 40/2015 establece que la delegación de firma no alterará la competencia del órgano delegante y para su validez no será necesaria su publicación. Esto la distingue de la delegación de competencias (art. 9.3), que sí requiere publicación. En las resoluciones firmadas por delegación debe constar esta circunstancia y la autoridad de procedencia."
  },

// ── ALEATORIZACIÓN ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepararPreguntas() {
  const mezcladas = shuffle(BANCO);
  return mezcladas.map(q => {
    const textoCorrecta = q.ops[q.c];
    const opsNuevas = shuffle(q.ops);
    const nuevoC = opsNuevas.indexOf(textoCorrecta);
    return { p: q.p, ops: opsNuevas, c: nuevoC, exp: q.exp };
  });
}

let preguntas = [];
let respondidas = 0, correctas = 0, incorrectas = 0;

function actualizarBarra() {
  const pct = preguntas.length ? (respondidas / preguntas.length) * 100 : 0;
  document.getElementById('barraFill').style.width = pct + '%';
  document.getElementById('barraNum').textContent = respondidas + ' / ' + preguntas.length;
  document.getElementById('scoreOk').textContent = '✓ ' + correctas;
  document.getElementById('scoreKo').textContent = '✗ ' + incorrectas;
}

function responder(qi, oi) {
  const q = preguntas[qi];
  const btns = document.querySelectorAll('[data-qi="' + qi + '"]');
  btns.forEach(b => b.disabled = true);
  btns.forEach((b, j) => {
    if (j === q.c) b.classList.add('correcta');
    else if (j === oi && oi !== q.c) b.classList.add('incorrecta');
  });
  document.getElementById('exp-' + qi).classList.add('visible');
  respondidas++;
  if (oi === q.c) correctas++; else incorrectas++;
  actualizarBarra();
  if (respondidas === preguntas.length) setTimeout(mostrarResultado, 700);
}

function mostrarResultado() {
  const pct = Math.round((correctas / preguntas.length) * 100);
  document.getElementById('resPunt').innerHTML = correctas + ' <span>/ ' + preguntas.length + '</span>';
  document.getElementById('resCorr').textContent = correctas;
  document.getElementById('resIncorr').textContent = incorrectas;
  document.getElementById('resPct').textContent = pct + '%';

  let txt, col, bg;
  if (pct >= 90)      { txt = '🏆 Sobresaliente'; col = '#166534'; bg = '#f0fdf4'; }
  else if (pct >= 75) { txt = '✅ Notable';        col = '#1e3a5f'; bg = '#eff6ff'; }
  else if (pct >= 60) { txt = '📘 Aprobado';       col = '#92400e'; bg = '#fffbeb'; }
  else                { txt = '❌ Insuficiente — ¡Sigue practicando!'; col = '#991b1b'; bg = '#fef2f2'; }

  document.getElementById('resCalif').innerHTML =
    '<span class="calif-badge" style="background:' + bg + ';color:' + col + '">' + txt + '</span>';

  const el = document.getElementById('resultado');
  el.classList.add('visible');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function render() {
  respondidas = 0; correctas = 0; incorrectas = 0;
  preguntas = prepararPreguntas();
  actualizarBarra();

  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const letras = ['A','B','C','D'];

  preguntas.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const opsHTML = q.ops.map((op, j) =>
      `<button class="opcion" data-qi="${i}" onclick="responder(${i},${j})">
        <span class="letra">${letras[j]})</span><span>${op}</span>
      </button>`
    ).join('');
    card.innerHTML =
      `<div class="card-num">Pregunta ${i + 1} de ${preguntas.length}</div>
       <div class="card-pregunta">${q.p}</div>
       <div class="opciones">${opsHTML}</div>
       <div class="explicacion" id="exp-${i}">${q.exp}</div>`;
    main.appendChild(card);
  });

  const sep = document.createElement('div');
  sep.className = 'divider';
  sep.textContent = 'Fin del test';
  main.appendChild(sep);

  const res = document.createElement('div');
  res.className = 'resultado';
  res.id = 'resultado';
  res.innerHTML =
    `<div class="resultado-eyebrow">Resultado final</div>
     <h2>Test completado</h2>
     <div class="resultado-nota" id="resPunt">0 <span>/ 50</span></div>
     <div id="resCalif"></div>
     <div class="stats">
       <div class="stat"><div class="stat-num" id="resCorr" style="color:#166534">0</div><div class="stat-lab">Correctas</div></div>
       <div class="stat"><div class="stat-num" id="resIncorr" style="color:#991b1b">0</div><div class="stat-lab">Incorrectas</div></div>
       <div class="stat"><div class="stat-num" id="resPct">0%</div><div class="stat-lab">% aciertos</div></div>
     </div>
     <p class="resultado-hint">Desplázate hacia arriba para revisar las explicaciones de cada pregunta.</p>
     <button class="btn btn-naranja" onclick="render(); window.scrollTo({top:0,behavior:'smooth'})">↺ Repetir con nuevo orden</button>`;
  main.appendChild(res);
}

render();
</script>
